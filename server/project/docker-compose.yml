services:
  api:
    build: .
    container_name: my-api
    ports:
      - "8080:8080"
    depends_on:
      - db
      - redis
    environment:
      ConnectionStrings__DefaultConnection: "Server=db;Database=MechiraSinit;User Id=sa;Password=Your_password123;TrustServerCertificate=True;Encrypt=False"
      Redis__ConnectionString: "redis:6379"

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: my-db
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=Your_password123
    ports:
      - "1433:1433"

  redis:
    image: redis:7-alpine
    container_name: my-redis
    ports:
      - "6379:6379"